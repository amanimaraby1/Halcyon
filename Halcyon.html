<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halcyon — Daily Quiet</title>
  <meta name="description" content="A daily gratitude sanctuary. Find your halcyon moments." />

  <!-- Favicon (kingfisher emoji) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊</text></svg>" />

  <!-- React & ReactDOM -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel (for JSX transform in browser) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d1117; }
    #root { min-height: 100vh; }

    /* Loading screen shown before React mounts */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0d1117;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading .bird { font-size: 48px; animation: floatY 2s ease-in-out infinite; }
    #loading .wordmark {
      font-family: sans-serif; font-size: 13px;
      letter-spacing: 6px; color: #3a5a6a;
      text-transform: uppercase;
    }
    #loading .bar-wrap {
      width: 120px; height: 2px;
      background: rgba(78,205,196,0.1);
      border-radius: 2px; overflow: hidden;
    }
    #loading .bar {
      height: 100%; width: 0;
      background: linear-gradient(90deg, #4ecdc4, #3ab8af);
      border-radius: 2px;
      animation: loadBar 1.2s ease forwards;
    }
    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes loadBar { 0%{width:0} 80%{width:90%} 100%{width:100%} }
  </style>
</head>
<body>

  <!-- Loading indicator -->
  <div id="loading">
    <div class="bird">🕊</div>
    <div class="wordmark">Halcyon</div>
    <div class="bar-wrap"><div class="bar"></div></div>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- Load the Halcyon component via Babel -->
  <script type="text/babel" data-type="module" src="Halcyon.jsx"></script>

  <script type="text/babel">
    // Mount the app and hide the loader
    const { useState, useEffect, useRef } = React;

    // Wait for Halcyon to be available then mount
    function mountApp() {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Halcyon />);

      // Fade out loader
      const loader = document.getElementById("loading");
      if (loader) {
        loader.style.opacity = "0";
        setTimeout(() => loader.remove(), 400);
      }
    }

    // Small delay to let Babel finish compiling Halcyon.jsx
    window.addEventListener("load", () => {
      setTimeout(mountApp, 100);
    });
  </script>

</body>
</html>
